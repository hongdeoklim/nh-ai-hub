# -----------------------------------------------------------------------------
# [22단계] generate-weekly-report — 매주 월요일 06:00 UTC 자동 실행 (Cron)
# -----------------------------------------------------------------------------
# Supabase Dashboard → Edge Functions → generate-weekly-report → Schedules
#   Cron expression: 0 6 * * 1
#   (UTC 06:00 = KST 15:00, 월요일)
#
# Secrets (Project Settings → Edge Functions):
#   ANTHROPIC_API_KEY  — 권장 (WEEKLY_REPORT_MODEL 기본: claude-3-5-sonnet-20241022)
#   OPENAI_API_KEY     — Anthropic 미설정 시 gpt-4o-mini 폴백
#   CRON_SECRET        — 선택: x-cron-secret 헤더 검증
#
# 수동 트리거 (service_role):
#   curl -X POST "$SUPABASE_URL/functions/v1/generate-weekly-report" \
#     -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
#     -H "Content-Type: application/json" \
#     -d '{"force":true}'
#
# pg_cron 예시는 supabase/migrations/20260522100000_weekly_ai_reports.sql 하단 주석 참고.
# -----------------------------------------------------------------------------

[functions.generate-weekly-report]
verify_jwt = false

[functions.deep-research]
verify_jwt = true

