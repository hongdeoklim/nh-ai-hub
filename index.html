<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      crossorigin
      href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>NH-AX-HUB</title>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('nh_theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #020617;
      }
      #initial-splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        z-index: 9999;
        font-family: 'Pretendard', sans-serif;
        transition: opacity 0.5s ease-out;
      }
      .splash-overlay {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 0%, rgba(74, 222, 128, 0.15) 0%, transparent 50%),
                    radial-gradient(circle at 50% 100%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
      }
      .splash-content {
        position: relative;
        z-index: 10;
        text-align: center;
        color: white;
        animation: fade-in 1s ease-out;
      }
      .splash-title {
        font-size: 2.25rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
        line-height: 1.4;
        padding-top: 0.1em;
        padding-bottom: 0.2em;
        background: linear-gradient(135deg, #4ade80 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .splash-subtitle {
        font-size: 1.125rem;
        font-weight: 500;
        color: #cbd5e1;
        letter-spacing: 0.05em;
        line-height: 1.4;
      }
      .splash-loader {
        margin-top: 2rem;
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #4ade80;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div id="initial-splash">
      <div class="splash-overlay"></div>
      <div class="splash-content">
        <div class="splash-title">농협네트웍스</div>
        <div class="splash-subtitle">Evolution to AI</div>
        <div style="display: flex; justify-content: center;">
          <div class="splash-loader"></div>
        </div>
      </div>
    </div>
    
    <script>
      const splashAlreadyShown = sessionStorage.getItem('splashShown');
      const splash = document.getElementById('initial-splash');
      
      if (splashAlreadyShown) {
        // 이미 본 적이 있으면 바로 제거 (새로고침 시 보이지 않게)
        if (splash) splash.remove();
      } else {
        // 처음 접속 시에만 표시하고 세션 스토리지에 기록
        sessionStorage.setItem('splashShown', 'true');
        window.addEventListener('load', () => {
          setTimeout(() => {
            if (splash) {
              splash.style.opacity = '0';
              setTimeout(() => {
                splash.remove();
              }, 500);
            }
          }, 1500);
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
